name: Build
on:
  push:
  workflow_dispatch:
jobs:
  deploy:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js and cache
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Run build
        run: npm run build
